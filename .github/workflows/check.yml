name: Format, Lint, and Test

on:
  workflow_call:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Setup Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: make install
      - name: Format and lint
        run: make lint
      - name: Run tests
        run: make test